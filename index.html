<!DOCTYPE html>
<html>
<head>
    <title>Smart City Complaint Analysis</title>
    <style>
        body { font-family: Arial; background: #1e1e2e; color: white; text-align: center; }

<body>
    <h1>🏙️ Smart City Complaint Analysis</h1>
